name: Sync approved Confluence sources

on:
  workflow_dispatch:
  schedule:
    # Adjust schedule with repo owner approval. GitHub schedule uses cron and runs in UTC.
    - cron: "30 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync approved Confluence pages
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: python scripts/sync_confluence_page.py --manifest sync_manifest.json
      - name: Validate provenance
        run: python scripts/validate_provenance.py
      - name: Create pull request if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No source changes detected."
            exit 0
          fi
          BRANCH="bot/source-sync-$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore(source_sync): sync approved Confluence sources"
          git push origin "$BRANCH"
          gh pr create             --title "chore(source_sync): sync approved Confluence sources"             --body "Automated source sync. Review provenance in changed files and maintenance/source-log.jsonl."             --base main             --head "$BRANCH"
